name: converge-magento

services:
  db:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: magento
      MARIADB_DATABASE: magento
      MARIADB_USER: magento
      MARIADB_PASSWORD: magento
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine

  # Docker creates the phpfpm repo bind-mount's parent dirs
  # (/var/www/html/app/code/Converge) owned by root before install.sh runs
  # as the `app` user — which then can't create app/etc during composer
  # install, so the whole install aborts on app/etc/vendor_path.php. This
  # one-shot pre-creates that path in the appdata volume and hands the
  # module-parent chain to `app` so the Magento install can populate app/.
  # It deliberately does NOT bind-mount the repo, so the chown can't reach
  # host files.
  init-perms:
    image: markoshust/magento-php:${PHP_TAG:-8.3-fpm-5}
    user: root
    volumes:
      - appdata:/var/www/html
    command:
      - bash
      - -c
      - >-
        mkdir -p /var/www/html/app/code/Converge &&
        chown app:app
        /var/www/html /var/www/html/app
        /var/www/html/app/code /var/www/html/app/code/Converge
    restart: "no"

  phpfpm:
    image: markoshust/magento-php:${PHP_TAG:-8.3-fpm-5}
    user: app
    working_dir: /var/www/html
    volumes:
      # Magento codebase (downloaded by install.sh on first run).
      - appdata:/var/www/html
      # PHP-FPM listens on /sock/docker.sock; shared with nginx so it can
      # reach it via the unix socket (the markoshust image no longer uses
      # TCP 9000 by default).
      - sockdata:/sock
      # This repo, bind-mounted directly into the Magento module path so
      # local edits are visible to Magento immediately. Mounting it on the
      # symlink path that older revisions used (/srv/converge) tripped
      # Magento's template path validator.
      - ../:/var/www/html/app/code/Converge/Converge
      - ./install.sh:/usr/local/bin/install-magento:ro
    env_file:
      - .env
    environment:
      COMPOSER_HOME: /var/www/html/.composer-home
      COMPOSER_MEMORY_LIMIT: "-1"
      MAGENTO_VERSION: "${MAGENTO_VERSION:-2.4.7-p3}"
      MAGENTO_BASE_URL: "${MAGENTO_BASE_URL:-http://localhost:8080/}"
      MAGENTO_ADMIN_USER: "${MAGENTO_ADMIN_USER:-admin}"
      MAGENTO_ADMIN_PASSWORD: "${MAGENTO_ADMIN_PASSWORD:-admin123!}"
      MAGENTO_ADMIN_EMAIL: "${MAGENTO_ADMIN_EMAIL:-dev@runconverge.com}"
    # Run the (idempotent) installer on every container start, then exec php-fpm.
    # First boot does the heavy lifting (~10 min); subsequent boots are seconds.
    command: ["bash", "-c", "/usr/local/bin/install-magento && exec php-fpm"]
    healthcheck:
      # The socket file appears once php-fpm has bound its listener — good
      # enough signal that the install finished and FPM is accepting requests.
      test: ["CMD-SHELL", "test -S /sock/docker.sock"]
      interval: 5s
      timeout: 3s
      retries: 10
      # Generous start_period so first-boot composer install doesn't get marked unhealthy.
      start_period: 600s
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_started
      init-perms:
        condition: service_completed_successfully

  nginx:
    image: markoshust/magento-nginx:${NGINX_TAG:-1.24-0}
    ports:
      - "${HTTP_PORT:-8080}:8000"
    volumes:
      - appdata:/var/www/html
      # Shared with phpfpm — nginx talks to PHP-FPM over /sock/docker.sock.
      - sockdata:/sock
      # Overrides the upstream so nginx uses the unix socket instead of TCP.
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      phpfpm:
        condition: service_healthy

volumes:
  appdata:
  dbdata:
  osdata:
  sockdata:
