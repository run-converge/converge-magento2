# PHP-FPM listens on a unix socket inside the markoshust/magento-php image.
# The socket is exposed via the shared `sockdata` volume — see compose.yaml.
upstream fastcgi_backend {
  server unix:/sock/docker.sock;
}

server {
  listen 8000;
  listen [::]:8000;

  set $MAGE_ROOT /var/www/html;

  fastcgi_buffer_size 64k;
  fastcgi_buffers 8 128k;

  location /livereload.js {
    proxy_set_header Host $host;
    proxy_pass http://phpfpm:35729/livereload.js;
  }

  location /livereload {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass http://phpfpm:35729/livereload;
  }

  include /var/www/html/nginx.conf.sample;
}
